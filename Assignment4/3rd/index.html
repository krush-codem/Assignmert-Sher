<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grid-3</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bento-container">
      <div class="bento-item card-profile-sidebar">
        <div class="sidebar-nav-tab">
          <div class="nav-pill-icon">✛</div>
          <div class="nav-links-vertical">
            <a href="#" style="color: #000000;">Podcast</a>
            <a href="#" class="active" style="color: #000000;">Portfolio</a>
            <a href="#" style="color: #000000;">Research</a>
            <a href="#" style="color: #000000;">Clients</a>
          </div>
          <div class="nav-pill-icon" style="font-size: 10px; opacity: 0.4">
            ●
          </div>
        </div>

        <div
          style="
            font-size: 12px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
          "
        >
          ⚙ About Me
        </div>

        <div class="avatar-graphic-container">
          <div class="avatar-halo-ring"></div>
          <div class="avatar-pink-backdrop"></div>
          <img
            src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=400&q=80"
            alt="Jon Daniel Profile"
            class="avatar-face"
            style=" border-radius: 50%; object-fit: cover"
          />
        </div>

        <h2 class="profile-greeting-text">Im,<br />Jon<br />Daniel</h2>

        <div class="profile-footer-row">
          <a href="mailto:inquiry@jondaniel.design" class="profile-email-link"
            >inquiry@jondaniel.design</a
          >
          <span style="color: #ffffff; font-size: 12px; opacity: 0.8">✉</span>
        </div>

        <div class="rotary-badge">
          <div class="rotary-inner">2026<br />Design<br />Portfolio</div>
        </div>
      </div>

      <div class="card-main-title-header">
        <h1 class="giant-title" >Portfolio<span>⌝</span></h1>
      </div>

      <div class="bento-item card-video-showcase">
        <img
          src="https://images.unsplash.com/photo-1519331379826-f10be5486c6f?auto=format&fit=crop&w=800&q=80"
          alt="Art Video"
          class="bg-image"
        />
        <div class="corner-bracket"></div>
        <button
          class="video-play-trigger-btn"
          aria-label="Play Portfolio Video"
        ></button>
      </div>

      <div class="bento-item card-metric-projects">
        <div class="corner-bracket"></div>
        <div class="metric-number">251</div>
        <div class="metric-label">Projects</div>
      </div>

      <div class="bento-item card-metric-awards-top">
        <div class="corner-bracket"></div>
        <div class="metric-number" style="color: #ffffff">156</div>
        <div class="metric-label" style="color: #ffffff; opacity: 0.9">
          Awards
        </div>
      </div>

      <div class="bento-item card-client-branding">
        <div
          class="corner-bracket"
          style="border-top-color: #ffffff; border-right-color: #ffffff"
        ></div>
        <div class="apple-icon"></div>
        <div class="client-label">Clients</div>
      </div>

      <div class="bento-item card-dual-art-block">
        <div class="art-split-left-pane">
          <img
            src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=150&q=80"
            alt="Geometric Art Sphere"
            class="3d-sphere-asset"
          />
        </div>

        <div class="art-split-right-pane">
          <div class="corner-bracket"></div>
          <div class="metric-number" style="font-size: 28px">172</div>
          <div class="metric-label" style="font-size: 12px; line-height: 1.3">
            Global Design<br />Awards.
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
