<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>a2</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="landing-wrapper">
      <nav class="navbar">
        <div class="brand-logo">Squad<span>Game</span></div>
        <ul class="nav-menu">
          <li class="nav-item"><a href="#">About</a></li>
          <li class="nav-item"><a href="#" class="active">Watch now</a></li>
          <li class="nav-item"><a href="#">Actors</a></li>
          <li class="nav-item"><a href="#">Contact</a></li>
        </ul>
        <div class="hamburger-toggle">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </nav>

      <main class="hero-main-viewport">
        <div class="hero-content-left">
          <div class="show-headline-group">
            <div class="sparkle-shape sparkle-1">✦</div>
            <div class="sparkle-shape sparkle-2">✦</div>
            <h1 class="title-svg-mimic">
              SquAd<br /><span class="pink-accent">Ga</span>me<span>-</span>
            </h1>
          </div>
          <p class="show-metadata-summary">
            Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br />
            Season 1: 9 Episodes
          </p>
          <div class="action-button-row">
            <a href="#" class="btn-base btn-primary-gradient">
              <div class="play-mini-vector"></div>
              Play Now
            </a>
            <a href="#" class="btn-base btn-secondary-outline">
              <div class="play-mini-vector"></div>
              Watch Trailer
            </a>
          </div>
        </div>

        <div class="hero-portrait-right-anchor">
          <img
            src="https://images.unsplash.com/photo-1635805737707-575885ab0820?auto=format&fit=crop&w=800&q=80"
            alt="Squid Game Pink Guard Mask"
            class="mask-man-img"
          />
        </div>
      </main>

      <section class="episodes-dock-panel">
        <div class="thumb-preview-card">
          <img
            src="https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?auto=format&fit=crop&w=400&q=80"
            alt="Episode Preview"
            class="thumb-asset"
          />
          <div class="absolute-card-overlay">
            <span class="card-watermark-title">Series / Squid Game</span>
            <div class="play-circle-trigger"></div>
          </div>
        </div>

        <div class="thumb-preview-card">
          <img
            src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&w=400&q=80"
            alt="Episode Preview"
            class="thumb-asset"
          />
          <div class="absolute-card-overlay">
            <span class="card-watermark-title">Trailer / Watch Mode</span>
            <div class="play-circle-trigger"></div>
          </div>
        </div>

        <div class="thumb-preview-card">
          <img
            src="https://images.unsplash.com/photo-1563089145-599997674d42?auto=format&fit=crop&w=400&q=80"
            alt="Episode Preview"
            class="thumb-asset"
          />
          <div class="absolute-card-overlay">
            <span class="card-watermark-title">Behind Scenes / Clip</span>
            <div class="play-circle-trigger"></div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
