<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pika</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card-container">
      <div class="left-panel">
        <div class="header-logo">Pokémon</div>

        <div class="content-box">
          <span class="subtitle">POKÉMON GEN I</span>
          <h1 class="main-title">Pikachu</h1>
          <p class="description">
            Pikachu is an Electric-type Pokémon introduced in Generation I.
            Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
            They are almost completely covered by yellow fur.
          </p>
        </div>
      </div>

      <div class="right-panel">
        <img
          src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png"
          alt="Pikachu"
          class="character-img"
        />
      </div>
    </div>
  </body>
</html>
