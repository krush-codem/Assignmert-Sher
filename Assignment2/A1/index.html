<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>a2=1</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="section left-section">
        <header class="header-left">
          <div class="logo">INSECT</div>
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search..." />
          </div>
        </header>

        <div class="vertical-title">Classification</div>

        <div class="classification-list">
          <div class="list-item">
            <span class="bullet"></span>
            <div>
              <div class="label">Class:</div>
              <div class="value">Insecta</div>
            </div>
          </div>
          <div class="list-item">
            <span class="bullet"></span>
            <div>
              <div class="label">Order:</div>
              <div class="value">Coleoptera</div>
            </div>
          </div>
          <div class="list-item">
            <span class="bullet"></span>
            <div>
              <div class="label">Family:</div>
              <div class="value">Cerambycidae</div>
            </div>
          </div>
          <div class="list-item">
            <span class="bullet"></span>
            <div>
              <div class="label">Sub-Family:</div>
              <div class="value">Cerambycinae</div>
            </div>
          </div>
          <div class="list-item">
            <span class="bullet"></span>
            <div>
              <div class="label">Tribe:</div>
              <div class="value">Callichromatini</div>
            </div>
          </div>
          <div class="list-item">
            <span class="bullet"></span>
            <div>
              <div class="label">Genus:</div>
              <div class="value">Pachyteria</div>
            </div>
          </div>
        </div>
      </div>

      <div class="section right-section">
        <nav class="navbar">
          <a href="#" class="nav-link">Home</a>
          <a href="#" class="nav-link">Shop</a>
          <a href="#" class="nav-link">About</a>
          <a href="#" class="nav-link">Gallery</a>
          <a href="#" class="nav-link">Contact</a>
        </nav>

        <div class="product-details">
          <h1 class="product-title">Pachyteria<br />equestris</h1>

          <div class="specs-grid">
            <div class="spec-graphic">
              <div class="insect-icon">
                🪲
                <div class="size-text">32 mm</div>
              </div>
            </div>
            <div class="spec-info">
              <div class="info-item">
                <span class="icon">📍</span>
                <div>
                  <span class="meta-label">Locality:</span>
                  <span class="meta-value">Malaysia</span>
                </div>
              </div>
              <div class="info-item">
                <span class="icon">♂</span>
                <div>
                  <span class="meta-label">Sex:</span>
                  <span class="meta-value">Male</span>
                </div>
              </div>
              <div class="info-item">
                <span class="icon">📐</span>
                <div>
                  <span class="meta-label">Size:</span>
                  <span class="meta-value">32 mm / 12 mm</span>
                </div>
              </div>
            </div>
          </div>

          <div class="price">$5.99</div>

          <div class="controls">
            <label class="toggle-container">
              <input type="checkbox" />
              <span class="slider"></span>
              <span class="toggle-label">View detailed antennae</span>
            </label>
            <label class="toggle-container">
              <input type="checkbox" />
              <span class="slider"></span>
              <span class="toggle-label">View underside</span>
            </label>
          </div>

          <button class="add-to-collection">Add to collection</button>
        </div>
      </div>

      <div class="display-dome">
        <img
          src="https://imgs.search.brave.com/bVQ6Cd3Fl-b4Gs3C7CpxqzGLrScT03e0U2fWgwvVXqY/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9zdGF0/aWMudmVjdGVlenku/Y29tL3N5c3RlbS9y/ZXNvdXJjZXMvdGh1/bWJuYWlscy8wMjYv/NzkxLzM0My9zbWFs/bC9idWxiLWxpZ2h0/LWFpLWdlbmVyYXRp/dmUtcG5nLnBuZw"
          alt="Pachyteria equestris in Glass Dome"
        />
      </div>
    </div>

</html>
